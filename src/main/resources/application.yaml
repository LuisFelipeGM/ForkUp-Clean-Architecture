server:
  port: 3710

spring:
  application:
    name: forkup.clean.arch

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        default_schema: forkup
        format_sql: true

  flyway:
    enabled: true
    default-schema: forkup
    schemas: forkup
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
